name: Deploy

on:
  workflow_dispatch:
    inputs:
      stage:
        description: "Deployment stage (main branch only)"
        required: false
        type: choice
        options:
          - staging
          - production

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: platform/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Determine stage
        id: stage
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          if [ "$BRANCH" = "main" ]; then
            STAGE="${{ inputs.stage || 'staging' }}"
          else
            # Sanitise branch name for SST stage (lowercase, alphanumeric + hyphens only)
            STAGE=$(echo "$BRANCH" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//')
          fi
          echo "name=$STAGE" >> "$GITHUB_OUTPUT"

      - name: Deploy to ${{ steps.stage.outputs.name }}
        run: npx sst deploy --stage ${{ steps.stage.outputs.name }}
